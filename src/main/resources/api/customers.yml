openapi: 3.0.3
info:
  title: Customers API
  description: API for managing customer data
  version: 1.0.0
  contact:
    name: API Support
    email: support@example.com

servers:
  - url: http://localhost:8080/api/v1
    description: Development server

tags:
  - name: Customers
    description: Operations related to customers

paths:
  /customers:
    get:
      tags:
        - Customers
      summary: Get all customers
      description: Retrieve a list of all customers
      operationId: getAllCustomers
      parameters:
        - name: page
          in: query
          description: Page number
          required: false
          schema:
            type: integer
            default: 0
        - name: perPage
          in: query
          description: Number of customers per page
          required: false
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCustomers'
        '500':
          description: Internal server error

    post:
      tags:
        - Customers
      summary: Create a new customer
      description: Create a new customer record
      operationId: createCustomer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCustomer'
      responses:
        '201':
          description: Customer created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '400':
          description: Bad request
        '500':
          description: Internal server error

  /customers/{id}:
    get:
      tags:
        - Customers
      summary: Get customer by ID
      description: Retrieve a specific customer by ID
      operationId: getCustomerById
      parameters:
        - name: id
          in: path
          description: Customer ID
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '404':
          description: Customer not found
        '500':
          description: Internal server error

    put:
      tags:
        - Customers
      summary: Update customer
      description: Update an existing customer
      operationId: updateCustomer
      parameters:
        - name: id
          in: path
          description: Customer ID
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCustomer'
      responses:
        '200':
          description: Customer updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '400':
          description: Bad request
        '404':
          description: Customer not found
        '500':
          description: Internal server error

    delete:
      summary: Delete customer
      description: Delete a customer by ID
      operationId: deleteCustomer
      parameters:
        - name: id
          in: path
          description: Customer ID
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Customer deleted successfully
        '400':
          description: Bad request
        '500':
          description: Internal server error

components:
  schemas:
    CreateCustomer:
      type: object
      properties:
        name:
          type: string
          description: Customer full name
          minLength: 1
          maxLength: 100
        email:
          type: string
          format: email
          description: Customer email address
        phoneNumber:
          type: string
          description: Customer phone number
          maxLength: 20
        cpf:
          type: string
          description: Customer CPF number without formatting
          maxLength: 11
      required:
        - name
        - email
        - phoneNumber
        - cpf
    UpdateCustomer:
      type: object
      properties:
        name:
          type: string
          description: Customer full name
          minLength: 1
          maxLength: 100
        email:
          type: string
          format: email
          description: Customer email address
        phoneNumber:
          type: string
          description: Customer phone number
          maxLength: 20
        cpf:
          type: string
          description: Customer CPF number without formatting
          maxLength: 11
      required:
        - name
        - email
        - phoneNumber
        - cpf
    PaginatedCustomers:
      type: object
      properties:
        page:
          type: integer
          description: Current page number
        perPage:
          type: integer
          description: Number of customers per page
        totalItems:
          type: integer
          format: int64
          description: Total number of customers
        items:
          type: array
          items:
            $ref: '#/components/schemas/Customer'
    Customer:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: Customer unique identifier
        name:
          type: string
          description: Customer full name
        email:
          type: string
          format: email
          description: Customer email address
        phoneNumber:
          type: string
          description: Customer phone number
        cpf:
          type: string
          description: Customer CPF number
        active:
          type: boolean
          description: Customer active status
        createdAt:
          type: string
          format: date-time
          description: Customer creation timestamp
        updatedAt:
          type: string
          format: date-time
          description: Customer last update timestamp
        deletedAt:
          type: string
          format: date-time
          description: Customer deletion timestamp